schema_version: 1

context:
  name: json2ast
  version: "1.0.1"
  python_min: "3.10"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/json2ast-${{ version }}.tar.gz
  sha256: 651948a0e6e68c5f5d65d16e9c45db66beed0b32fd94abc49725e86f80c90a92

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python 3.10.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - json2ast
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: The opposite of ast2json
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/HacMan137/json2ast

extra:
  recipe-maintainers:
    - jan-janssen
